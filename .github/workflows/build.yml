name: Build Windows EXE
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame==2.6.1 customtkinter==5.2.2 pyinstaller
      - name: Create default map
        run: |
          cd game
          python -c "from play import create_default_map; import os; os.makedirs('maps',exist_ok=True); create_default_map('maps/default.json')"
      - name: Build Game
        run: |
          cd game
          pyinstaller --onefile --windowed --name "ARE_YOU_READY" main.py
          copy dist\ARE_YOU_READY.exe ..
      - name: Build Constructor
        run: |
          cd constructor
          pyinstaller --onefile --windowed --name "ARE_YOU_READY_Constructor" main.py
          copy dist\ARE_YOU_READY_Constructor.exe ..
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          files: |
            ARE_YOU_READY.exe
            ARE_YOU_READY_Constructor.exe
          target_commitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
